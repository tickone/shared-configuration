# Go Testing Configuration

.go-test-base:
  image: golang:latest
  variables:
    # 避免 go build/test 寫到 /root
    GOPATH: "$CI_PROJECT_DIR/.go"
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
    # 私有 GitLab 模組：繞過公開 module proxy 與 checksum DB
    GOPRIVATE: "gitlab.com/dimorder/*"
    GONOSUMDB: "gitlab.com/dimorder/*"
    GONOPROXY: "gitlab.com/dimorder/*"
  before_script:
    - go version
    - go env
    - mkdir -p "$GOPATH" "$GOCACHE"
    # 建非 root user（Debian系的 golang image 通常有 adduser）
    - adduser --disabled-password --gecos "" app || true
    - mkdir -p /home/app
    # 把工作目錄、快取與 home 目錄權限給 app
    - chown -R app:app "$CI_PROJECT_DIR" /home/app
    # 把 Go 環境變數寫入 app 的 env script（su 不繼承環境變數）
    - |
      printf '%s\n' \
        'export HOME="/home/app"' \
        "export PATH=\"${PATH}\"" \
        "export GOPATH=\"${GOPATH}\"" \
        "export GOCACHE=\"${GOCACHE}\"" \
        "export GOPRIVATE=\"${GOPRIVATE}\"" \
        "export GONOSUMDB=\"${GONOSUMDB}\"" \
        "export GONOPROXY=\"${GONOPROXY}\"" \
        > /home/app/.go-env.sh
      chmod 600 /home/app/.go-env.sh
      chown app:app /home/app/.go-env.sh
    # 設定 git credentials，讓 app 使用者能存取私有 GitLab 模組
    - |
      if [ -n "$GIT_PASSWORD" ]; then
        printf '[url "https://%s:%s@gitlab.com/"]\n\tinsteadOf = https://gitlab.com/\n' "$GIT_USERNAME" "$GIT_PASSWORD" > /root/.gitconfig
      fi
    # 先用 app 身份下載依賴（避免 root-owned 檔案）
    - su - app -s /bin/bash -c ". /home/app/.go-env.sh && printf 'user=%s home=%s go=%s netrc=%s\n' \"\$(whoami)\" \"$HOME\" \"\$(command -v go)\" \"\$(test -f ~/.netrc && echo present || echo missing)\" && cd '$CI_PROJECT_DIR' && go mod download"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .cache/go-build/

# Unit Tests
go-unit-test:
  extends: .go-test-base
  stage: test
  variables:
    # 指定要計算覆蓋率的套件，用逗號分隔
    # 留空 "" = 只計算有測試的套件 (推薦)
    # "./..." = 計算所有套件
    # "internal/handler,internal/service" = 計算指定套件（會包含沒測試的檔案）
    COVERAGE_PACKAGES: ""
    # 排除特定檔案不計入覆蓋率，用逗號分隔（支援萬用字元）
    # 例如: "internal/handler/utils.go,**/mock_*.go,**/*_test_helper.go"
    COVERAGE_EXCLUDE_FILES: ""
  script:
    - |
      if [ -n "$COVERAGE_PACKAGES" ]; then
        su - app -s /bin/bash -c ". /home/app/.go-env.sh && cd '$CI_PROJECT_DIR' && go test -v ./... -coverpkg=${COVERAGE_PACKAGES} -coverprofile=coverage.out"
      else
        # 不指定 coverpkg，只計算實際有測試的套件
        su - app -s /bin/bash -c ". /home/app/.go-env.sh && cd '$CI_PROJECT_DIR' && go test -v ./... -coverprofile=coverage.out"
      fi
    # 顯示每個套件的覆蓋率明細
    - su - app -s /bin/bash -c ". /home/app/.go-env.sh && cd '$CI_PROJECT_DIR' && go tool cover -func=coverage.out | grep -E '(total:|\\..go:)' | tail -20"
    # 如果有指定排除檔案，則過濾 coverage.out
    - |
      if [ -n "$COVERAGE_EXCLUDE_FILES" ]; then
        su - app -s /bin/bash -c "
          . /home/app/.go-env.sh
          cd '$CI_PROJECT_DIR'
          if [ -f coverage.out ]; then
            # 保留第一行 (mode: set)
            head -n 1 coverage.out > coverage.out.filtered
            # 取得內容行
            tail -n +2 coverage.out > coverage.out.content
            # 對每個排除 pattern 進行過濾
            IFS=',' read -ra EXCLUDE_ARRAY <<< \"$COVERAGE_EXCLUDE_FILES\"
            for pattern in \"\${EXCLUDE_ARRAY[@]}\"; do
              pattern=\$(echo \$pattern | xargs)
              if [ -n \"\$pattern\" ]; then
                grep -v \"\$pattern\" coverage.out.content > coverage.out.content.tmp || true
                mv coverage.out.content.tmp coverage.out.content
              fi
            done
            # 合併結果
            cat coverage.out.content >> coverage.out.filtered
            mv coverage.out.filtered coverage.out
            rm -f coverage.out.content
          fi
        "
      fi
    - su - app -s /bin/bash -c ". /home/app/.go-env.sh && cd '$CI_PROJECT_DIR' && go tool cover -func=coverage.out"
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.out
      - coverage.xml
    expire_in: 30 days

