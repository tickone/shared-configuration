# Go Testing Configuration

.go-test-base:
  image: golang:latest
  variables:
    # 避免 go build/test 寫到 /root
    GOPATH: "$CI_PROJECT_DIR/.go"
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  before_script:
    - go version
    - go env
    - mkdir -p "$GOPATH" "$GOCACHE"
    # 建非 root user（Debian系的 golang image 通常有 adduser）
    - adduser --disabled-password --gecos "" app || true
    # 把工作目錄與快取目錄權限給 app
    - chown -R app:app "$CI_PROJECT_DIR"
    # 先用 app 身份下載依賴（避免 root-owned 檔案）
    - su -s /bin/bash app -c "cd '$CI_PROJECT_DIR' && go mod download"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
      - .cache/go-build/

# Unit Tests
go-unit-test:
  extends: .go-test-base
  stage: test
  script:
    - su -s /bin/bash app -c "cd '$CI_PROJECT_DIR' && go test -v -short ./... -coverprofile=coverage.out"
    - su -s /bin/bash app -c "cd '$CI_PROJECT_DIR' && go tool cover -func=coverage.out"
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.out
      - coverage.xml
    expire_in: 30 days

