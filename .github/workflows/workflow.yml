name: Deploy to Cloudflare R2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT: https://9fefd588b1a6a938203fa1ef7c5cf928.r2.cloudflarestorage.com
      R2_BUCKET: gitlab-ci

    steps:
      - uses: actions/checkout@v4

      - name: Check AWS CLI
        run: aws --version

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync . "s3://$R2_BUCKET" \
            --endpoint-url "$R2_ENDPOINT" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".workflow/*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            --exclude "LICENSE.*" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "node_modules/*" \
            --exclude "vendor/*"
